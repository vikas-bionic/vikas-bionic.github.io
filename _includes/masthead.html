{% include base_path %}
<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button><span class="navicon"></span></button>
        <ul class="visible-links">
          <li class="masthead__tagline persist">
            <svg id="nav-cat" viewBox="0 0 60 36" width="50" height="30" aria-hidden="true" focusable="false">
              <ellipse cx="12" cy="7" rx="6" ry="7" fill="var(--global-base-color)"></ellipse>
              <ellipse cx="48" cy="7" rx="6" ry="7" fill="var(--global-base-color)"></ellipse>
              <ellipse cx="30" cy="20" rx="22" ry="15" fill="var(--global-base-color)"></ellipse>
              <ellipse cx="20" cy="18" rx="7" ry="8" fill="#fff"></ellipse>
              <ellipse cx="40" cy="18" rx="7" ry="8" fill="#fff"></ellipse>
              <circle id="cat-pupil-left" cx="20" cy="18" r="3" fill="#14100a"></circle>
              <circle id="cat-pupil-right" cx="40" cy="18" r="3" fill="#14100a"></circle>
              <rect id="cat-lid-left" x="12" y="9" width="16" height="18" fill="var(--global-bg-color)"></rect>
              <rect id="cat-lid-right" x="32" y="9" width="16" height="18" fill="var(--global-bg-color)"></rect>
            </svg>
          </li>
          {% for link in site.data.navigation.main %}
            {% if link.url contains 'http' %}
              {% assign domain = '' %}
            {% else %}
              {% assign domain = base_path %}
            {% endif %}
            <li class="masthead__menu-item {% if page.url contains link.url and link.url != '/' %}selected{% endif %}">
              <a href="{{ domain }}{{ link.url }}">{{ link.title }}</a>
            </li>
          {% endfor %}
          <li id="theme-toggle" class="masthead__menu-item persist tail">
            <span class="theme-switch" role="button" aria-label="Toggle dark mode" title="Toggle theme">
              <i class="fa-solid fa-sun theme-switch__icon theme-switch__icon--sun" aria-hidden="true"></i>
              <i class="fa-solid fa-moon theme-switch__icon theme-switch__icon--moon" aria-hidden="true"></i>
              <span class="theme-switch__thumb"></span>
            </span>
          </li>
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
